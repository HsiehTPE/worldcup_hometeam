<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 世界杯人格测试</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-topbar">
        <div class="brand-wordmark">World Cup · 2026</div>
        <div class="brand-pill">Personality Test</div>
      </div>
      <h1>你的 2026 世界杯命定主队是谁？</h1>
      <p class="hero-copy">
        16 道题，测出你会为哪支世界杯主队动心。
      </p>
      <div class="hero-meta">
        <span><strong>16</strong> 道世界杯题目</span>
        <span><strong>16</strong> 支主队结果</span>
        <span><strong>4</strong> 位结果码</span>
      </div>
      <button id="start-button" class="primary-button">开始测试</button>
      <div class="hero-field-strip" aria-hidden="true">
        <div class="pitch-card pitch-card--left">热血</div>
        <div class="pitch-card pitch-card--center">控场</div>
        <div class="pitch-card pitch-card--right">逆袭</div>
      </div>
    </header>

    <main class="quiz-stage">
      <section id="quiz-panel" class="panel hidden" aria-live="polite">
        <button id="home-button" class="ghost-button quiz-home-button" type="button">返回首页</button>
        <div class="progress-row">
          <div>
            <p id="part-label" class="eyebrow"></p>
            <h2 id="question-index" class="section-title"></h2>
          </div>
          <div class="quiz-brandbar">
            <div class="quiz-brand-copy">
              <span class="quiz-brand-wordmark">2026 世界杯人格测试</span>
              <span class="quiz-brand-subtitle">测出你的命定主队</span>
            </div>
          </div>
          <div class="progress-copy">
            <span id="progress-text"></span>
          </div>
        </div>
        <div class="progress-bar" aria-hidden="true">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <article class="question-card">
          <h3 id="question-text" class="question-text"></h3>
          <figure id="question-media" class="question-media hidden">
            <div id="question-media-grid" class="question-media-grid"></div>
            <figcaption id="question-media-caption" class="question-media-caption"></figcaption>
          </figure>
          <div id="options-list" class="options-list"></div>
        </article>
        <div class="nav-row">
          <button id="prev-button" class="ghost-button" type="button">上一题</button>
          <button id="next-button" class="primary-button" type="button" disabled>下一题</button>
        </div>
      </section>

      <section id="result-panel" class="panel hidden" aria-live="polite">
        <div class="result-header">
          <p id="result-phase" class="eyebrow hidden"></p>
          <div id="result-flag" class="result-flag" aria-hidden="true"></div>
          <h2 id="result-title" class="result-title"></h2>
          <p id="result-label" class="result-label"></p>
          <p id="result-hook" class="result-hook"></p>
        </div>

        <div class="result-grid">
          <article class="result-card result-card--story">
            <p class="result-card-label">详细解释</p>
            <p id="result-description" class="result-body"></p>
          </article>
          <article class="result-card">
            <p class="result-card-label">适合你的观赛方式</p>
            <p id="result-watch-style" class="result-body"></p>
          </article>
          <article class="result-card">
            <p class="result-card-label">你的球迷口号</p>
            <p id="result-chant" class="result-quote"></p>
          </article>
          <article class="result-card">
            <p class="result-card-label">分享卡文案</p>
            <p id="result-share-copy" class="result-share-copy"></p>
          </article>
        </div>

        <div class="result-actions">
          <div class="result-action-cell">
            <button id="copy-button" class="ghost-button" type="button">复制结果文案</button>
          </div>
          <div class="result-action-cell">
            <button id="restart-button" class="primary-button" type="button">重新测试</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
